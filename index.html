<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Переводность</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
    <div class="title">✧ переводность ✧</div>
    <div class="plaque input-plaque">
    <textarea
            id="sourceText"
            class="text-input"
            placeholder="Введите текст..."
            rows="2"
            aria-label="Текст для перевода"
    ></textarea>
    </div>

    <div class="button-wrapper">
        <button class="translate-btn" id="translateButton">
            <span>↻</span> Перевод
        </button>
    </div>
    <div class="plaque output-plaque" id="outputPlaque">
        <span id="translationResult" class="output-text placeholder-text">Введите текст для перевода</span>
    </div>
    <footer class="footer">
        <span class="footer-text">Разработано afarstic</span>
    </footer>
</div>
<script src="script.js"></script>
</body>
</html>
